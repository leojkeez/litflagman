<!-- Скрытые данные регионов для карты -->
<div class="js-map-regions-data d-none" style="display: none !important;">
  {% for reg in map_regions %}
    <div class="js-map-region-item"
         data-svg-id="{{ reg.svg_id }}"
         data-title="{{ reg.title }}"
         data-text="{{ reg.right_column_text|default:'' }}"
         data-coat="{% if reg.coat_of_arms %}{{ reg.coat_of_arms.url }}{% endif %}"
         data-years="{% for contest in reg.contest_main_project.all %}{{ contest.year }}{% if not forloop.last %}, {% endif %}{% endfor %}"
         data-url="{% if reg.region_url %}{{ reg.region_url }}{% endif %}">
    </div>
  {% endfor %}
</div>

<!-- Карточка региона, которая появляется при клике -->
<div class="winner-card mt-3 p-3 d-none js-winner-card transition-all" style="background-color: #ffffff; border-color: #e2e8f0; border-radius: 0.75rem; opacity: 0; transform: translateY(10px);">
  <div class="row align-items-center g-2">
    <div class="col-sm-2 col-3 text-center js-winner-coat-container">
      <img src="" alt="Герб региона" class="img-fluid js-winner-coat" style="max-height: 50px; object-fit: contain;">
    </div>
    <div class="col js-winner-content-container">
      <h5 class="fw-bold text-dark mb-1 d-flex align-items-center flex-wrap gap-2">
        <span class="js-winner-title"></span>
        <span class="badge text-dark js-winner-year" style="font-size: 0.85rem; font-family: 'Alumni Sans', sans-serif; font-weight: 700; letter-spacing: 0.05rem; padding: 0.25em 0.6em;"></span>
      </h5>
      <div class="text-muted small mb-1 js-winner-text" style="line-height: 1.35; font-family: sans-serif;"></div>
      <div>
        <a href="" class="text-decoration-none fw-semibold js-winner-link transition-all" style="color: #9932CC;">
          Страница победителя конкурса &rarr;
        </a>
      </div>
    </div>
  </div>
</div>
