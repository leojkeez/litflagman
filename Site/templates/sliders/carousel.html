{% if slider %}
<div id="carousel-{{ slider.id }}" class="carousel slide carousel-custom" data-bs-ride="carousel">
  
  <!-- Индикаторы (точки) -->
  <div class="carousel-indicators">
    {% for item in ordered_photos %}
      <button type="button" 
              data-bs-target="#carousel-{{ slider.id }}" 
              data-bs-slide-to="{{ forloop.counter0 }}" 
              {% if forloop.first %}class="active" aria-current="true"{% endif %} 
              aria-label="Slide {{ forloop.counter }}">
      </button>
    {% endfor %}
  </div>

  <!-- Слайды -->
  <div class="carousel-inner">
    {% for item in ordered_photos %}
      <div class="carousel-item {% if forloop.first %}active{% endif %}">
        {% if item.photo.image %}
          <img src="{{ item.photo.image.url }}" class="d-block w-100" alt="{{ item.photo.title }}">
        {% endif %}
      </div>
    {% endfor %}
  </div>

  <!-- Кнопки управления -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carousel-{{ slider.id }}" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Предыдущий</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carousel-{{ slider.id }}" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Следующий</span>
  </button>

</div>

<!-- Превью фотографий под слайдером (горизонтальная лента) -->
<div class="carousel-thumbnails d-flex justify-content-center gap-2 mt-3 overflow-auto pb-1">
  {% for item in ordered_photos %}
    {% if item.photo.image %}
      <div class="thumbnail-item {% if forloop.first %}active{% endif %}" 
           data-bs-target="#carousel-{{ slider.id }}" 
           data-bs-slide-to="{{ forloop.counter0 }}">
        <img src="{{ item.photo.image.url }}" alt="Превью {{ forloop.counter }}">
      </div>
    {% endif %}
  {% endfor %}
</div>

<script>
  // Скрипт перелистывания слайдов мышкой (drag-to-slide) на ПК версии
  document.addEventListener("DOMContentLoaded", function() {
    const carouselEl = document.getElementById("carousel-{{ slider.id }}");
    if (!carouselEl) return;

    let startX = 0;
    let endX = 0;
    let isDragging = false;

    carouselEl.addEventListener('mousedown', (e) => {
      startX = e.pageX;
      isDragging = true;
      carouselEl.style.cursor = 'grabbing';
    });

    carouselEl.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      endX = e.pageX;
    });

    const handleDragEnd = () => {
      if (!isDragging) return;
      isDragging = false;
      carouselEl.style.cursor = 'grab';

      const diffX = endX - startX;
      const threshold = 60; // Порог сдвига мыши в пикселях для переключения

      if (Math.abs(diffX) > threshold) {
        // Подключаемся к Bootstrap Carousel API
        const carousel = bootstrap.Carousel.getOrCreateInstance(carouselEl);
        if (diffX > 0) {
          carousel.prev();
        } else {
          carousel.next();
        }
      }
      startX = 0;
      endX = 0;
    };

    window.addEventListener('mouseup', handleDragEnd);
    carouselEl.addEventListener('mouseleave', handleDragEnd);

    carouselEl.querySelectorAll('img').forEach(img => {
      img.addEventListener('dragstart', (e) => e.preventDefault());
    });

    // Синхронизация активной превьюшки при смене слайда
    carouselEl.addEventListener('slide.bs.carousel', (e) => {
      const index = e.to;
      const parentEl = carouselEl.parentElement;
      if (parentEl) {
        const thumbnails = parentEl.querySelectorAll('.thumbnail-item');
        thumbnails.forEach((thumb, i) => {
          if (i === index) {
            thumb.classList.add('active');
            // Плавно центрируем активную превьюшку в ленте
            thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          } else {
            thumb.classList.remove('active');
          }
        });
      }
    });
  });
</script>

<style>
  /* Фиксация высоты карусели и вписывание вертикальных картинок */
  .carousel-custom {
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    background-color: #1a1a1a; /* Темный фон по краям для узких фото */
    cursor: grab;
    user-select: none;
  }
  
  .carousel-custom .carousel-inner {
    height: 480px; /* Фиксированная высота слайдера на ПК */
  }
  
  .carousel-custom .carousel-item {
    height: 100%;
    width: 100%;
  }
  
  .carousel-custom .carousel-item img {
    height: 100% !important;
    width: 100% !important;
    object-fit: cover; /* Заполняет всю область высоты слайдера без деформации */
    object-position: center;
  }

  /* Превью под слайдером */
  .carousel-thumbnails {
    max-width: 100%;
    scrollbar-width: none; /* Скрываем стандартный скроллбар в Firefox */
    padding-top: 8px; /* Отступ сверху, чтобы превью не обрезались при увеличении и подъеме вверх */
    padding-bottom: 8px; /* Отступ снизу для баланса */
  }
  .carousel-thumbnails::-webkit-scrollbar {
    display: none; /* Скрываем скроллбар в Chrome/Safari */
  }
  
  .thumbnail-item {
    width: 90px;
    height: 60px;
    flex-shrink: 0;
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid transparent !important;
    background-origin: border-box !important;
    background-clip: padding-box, border-box !important;
    background-image: linear-gradient(#fff, #fff), linear-gradient(#dee2e6, #dee2e6) !important;
    opacity: 0.5;
    transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1);
  }
  
  .thumbnail-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .thumbnail-item.active, .thumbnail-item:hover {
    opacity: 1;
    /* Плавный переливающийся градиент подсветки */
    background-image: linear-gradient(#fff, #fff), linear-gradient(90deg, var(--color-turquoise) 0%, var(--color-purple) 50%, var(--color-turquoise) 100%) !important;
    background-size: auto, 200% auto !important;
    animation: border-shimmer 3s linear infinite;
    transform: translateY(-3px); /* Подъем чуть выше */
  }
  
  @media (max-width: 991.98px) {
    .carousel-custom .carousel-inner {
      height: 380px; /* Высота для планшетов */
    }
  }
  
  @media (max-width: 575.98px) {
    .carousel-custom .carousel-inner {
      height: 250px; /* Высота для мобильных */
    }
    .thumbnail-item {
      width: 70px;
      height: 45px;
    }
  }
</style>
{% endif %}
